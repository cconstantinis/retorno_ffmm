<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fondos Mutuos · Retorno vs Peers</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#f6f5f0;--card:#fff;--border:#e2dfd6;
  --text:#1c1b18;--muted:#706e66;--faint:#b8b5ac;
  --blue:#185FA5;--green:#2a6b1a;--red:#9b2222;
  --cat-bg:#1a2e45;--cat-text:#a8c8e8;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--r:6px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#141412;--card:#1e1d1a;--border:#2e2d28;--text:#edecea;--muted:#8a8880;--faint:#4a4944;--blue:#5b9fd4;--green:#5fad43;--red:#d46060;--cat-bg:#0d1f33;--cat-text:#7ab3d4;}
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px 60px;}

header{padding:24px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;}
h1{font-size:16px;font-weight:500;}
.sub{font-size:12px;color:var(--muted);font-family:var(--mono);}

.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:10px;}
.ctrl{display:flex;flex-direction:column;gap:3px;}
.ctrl label{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
input[type=date]{font-family:var(--mono);font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);outline:none;}
input[type=date]:focus{border-color:var(--blue);}
.btn{font-family:var(--mono);font-size:12px;font-weight:500;padding:6px 18px;border:1px solid var(--blue);border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;}
.btn:hover{opacity:.85;}.btn:disabled{opacity:.4;cursor:not-allowed;}
.pills{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.pills span{font-size:11px;color:var(--faint);font-family:var(--mono);}
.pill{font-family:var(--mono);font-size:11px;padding:2px 10px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .12s;}
.pill:hover{border-color:var(--blue);color:var(--blue);}
.status{font-size:11px;font-family:var(--mono);color:var(--muted);min-height:20px;margin-bottom:14px;}
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TABLE */
.perf-block{margin-bottom:28px;}
.block-title{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 0 6px;border-bottom:2px solid var(--border);margin-bottom:0;}
.tcard{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;text-align:right;}
th.l{text-align:left;}
td{padding:5px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;text-align:right;white-space:nowrap;}
td.fname{text-align:left;font-family:var(--sans);font-size:12px;max-width:320px;}
tr.cat-row td{
  background:var(--cat-bg);color:var(--cat-text);
  font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;
  padding:6px 10px;border-bottom:none;border-top:2px solid var(--blue);
  text-align:left;
}
.cat-label{font-size:9px;opacity:.6;margin-right:4px;letter-spacing:.05em;}
tr:last-child td{border-bottom:none;}
.drow{cursor:pointer;transition:background .1s;}
.drow:hover{background:color-mix(in srgb,var(--blue) 5%,transparent);}
.drow.sel{background:color-mix(in srgb,var(--blue) 10%,transparent);}
.cc{color:var(--blue);font-weight:500;}
.pos{color:var(--green);font-weight:500;}.neg{color:var(--red);font-weight:500;}.neu{color:var(--faint);}
.r1{font-size:9px;padding:1px 4px;border-radius:3px;background:color-mix(in srgb,var(--green) 14%,transparent);color:var(--green);margin-left:4px;}
.rl{font-size:9px;padding:1px 4px;border-radius:3px;background:color-mix(in srgb,var(--red) 14%,transparent);color:var(--red);margin-left:4px;}
.na{color:var(--faint);font-size:11px;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-family:var(--mono);font-size:13px;}

/* CHART SECTION */
.chart-section{display:none;margin-top:32px;}
.chart-section.visible{display:block;}
.chart-section-title{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 0 6px;border-bottom:2px solid var(--border);margin-bottom:16px;}
.chart-toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:16px;}
.chart-toolbar .ctrl select{font-family:var(--mono);font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);outline:none;min-width:280px;}
.chart-toolbar .ctrl select:focus{border-color:var(--blue);}
.cbtns{display:flex;gap:5px;flex-wrap:wrap;}
.cpill{font-family:var(--mono);font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .12s;}
.cpill:hover,.cpill.on{border-color:var(--blue);color:var(--blue);background:color-mix(in srgb,var(--blue) 8%,transparent);}
.crange{display:flex;gap:5px;align-items:center;}
.crange input{font-family:var(--mono);font-size:11px;padding:3px 7px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);outline:none;width:112px;}
.crange input:focus{border-color:var(--blue);}
.crange span{font-size:11px;color:var(--faint);}
.capply{font-family:var(--mono);font-size:11px;padding:3px 10px;border:1px solid var(--blue);border-radius:var(--r);background:transparent;color:var(--blue);cursor:pointer;}
.capply:hover{background:color-mix(in srgb,var(--blue) 8%,transparent);}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.chart-card-title{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);color:var(--muted);}
.leg.hi{color:var(--text);font-weight:500;}
.leg-line{width:16px;height:2px;border-radius:1px;flex-shrink:0;}
.chart-box{position:relative;height:240px;}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div>
    <h1>Fondos Mutuos · Retorno vs Peers</h1>
    <div class="sub">Credicorp Capital · Renta Fija · Fuente: SMV</div>
  </div>
  <div class="sub" id="kv-info">—</div>
</header>

<div class="controls">
  <div class="ctrl"><label>Fecha de corte</label><input type="date" id="d1"></div>
  <button class="btn" id="btnCalc" onclick="calcular()">Calcular</button>
</div>
<div class="pills">
  <span>Ver al cierre de:</span>
  <button class="pill" onclick="setFin('hoy')">Último disponible</button>
  <button class="pill" onclick="setFin('vier')">Último viernes</button>
</div>
<div class="status" id="status"></div>

<div id="content"><div class="empty">Selecciona una fecha de corte y presiona Calcular.</div></div>

<!-- CHART SECTION -->
<div class="chart-section" id="chart-section">
  <div class="chart-section-title">Serie de tiempo vs peers</div>
  <div class="chart-toolbar">
    <div class="ctrl">
      <label>Fondo</label>
      <select id="fondo-select" onchange="dibujarCharts()"><option value="">— Selecciona un fondo —</option></select>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;">
      <div class="cbtns">
        <button class="cpill" onclick="chartRango(1,this)">1d</button>
        <button class="cpill" onclick="chartRango(3,this)">3d</button>
        <button class="cpill" onclick="chartRango(7,this)">7d</button>
        <button class="cpill" onclick="chartRango(15,this)">15d</button>
        <button class="cpill" onclick="chartRango(30,this)">30d</button>
        <button class="cpill on" onclick="chartRango('ytd',this)">YTD</button>
      </div>
      <div class="crange">
        <input type="date" id="c0">
        <span>→</span>
        <input type="date" id="c1">
        <button class="capply" onclick="chartRangoCustom()">Aplicar</button>
      </div>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-card-title">Retorno bruto (bps)</div>
      <div class="legend" id="legend-bruto"></div>
      <div class="chart-box"><canvas id="chart-bruto" role="img" aria-label="Retorno bruto en bps"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Retorno neto (bps)</div>
      <div class="legend" id="legend-neto"></div>
      <div class="chart-box"><canvas id="chart-neto" role="img" aria-label="Retorno neto en bps"></canvas></div>
    </div>
  </div>
</div>

</div>
<script>
const WORKER = "https://retorno-ffmm.carloconstantini1.workers.dev";

// Credicorp primero en cada categoría
const CATS = {
  "Corto Plazo Soles":["CRED. CONSER. CORTO PLAZO S/ CREDICORP SAF","BBVA RENTA CORTO PLAZO S/. BBVA SAF","FONDOS SURA SAF-SURA CORTO PLAZO SOLES  SERIE B","INTERFONDO-IF OPORTUNIDAD SOLES  SERIE A","SF Corto Plazo Plus S/ SCOTIA FONDOS"],
  "Mediano Plazo Soles":["CC CONSERV. MED. PLAZO S/. CREDICORP SAF","BBVA RENTA MED. PLAZO S/. BBVA SAF","FONDOS SURA SAF-SURA RENTA SOLES  SERIE B","IF MEDIANO PLAZO SOLES INTERFONDO","SF MEDIANO PLAZO FLEX S/ SCOTIA FONDOS"],
  "Corto Plazo Dólares":["CRED. CONSER. CORTO PLAZO $ CREDICORP SAF","BBVA RENTA CORTO PLAZO $ BBVA SAF","FONDOS SURA SAF-SURA CORTO PLAZO DOLARES  SERIE B","INTERFONDO-IF OPORTUNIDAD  SERIE A","SF Corto Plazo Plus $ SCOTIA FONDOS"],
  "Mediano Plazo Dólares":["CREDICORP CONSER. MED. PLA. $ CREDICORP SAF","BBVA RENTA MED. PLAZO $ BBVA SAF","IF MEDIANO PLAZO INTERFONDO","FONDOS SURA SAF-FdF SURA RENTA DOLARES  SERIE B","SF MEDIANO PLAZO FLEX $ SCOTIA FONDOS"],
  "Liquidez Soles":["CRED. CONSERVAD. LIQUIDEZ S/ CREDICORP SAF","BBVA CASH SOLES BBVA SAF","FONDOS SURA SAF-SURA ULTRA CASH SOLES  SERIE B","SF Liquidez S/. SCOTIA FONDOS","INTERFONDO-IF LIBRE DISPONIBILIDAD S/.  SERIE A"],
  "Liquidez Dólares":["CRED. CONSERVADOR LIQUIDEZ $ CREDICORP SAF","BBVA CASH DOLARES BBVA SAF","FONDOS SURA SAF-SURA ULTRA CASH DOLARES  SERIE B","SF LIQUIDEZ $ SCOTIA FONDOS","INTERFONDO-IF LIBRE DISPONIBILIDAD  SERIE A"],
  "Deuda Corp Soles":["CC DEUDA CORPORATIVA SOLES CREDICORP SAF","SURA DEUDA SOBER. DISTRIB. S/ FONDOS SURA SAF"]
};

const COM_BASE = {
  "CRED. CONSER. CORTO PLAZO S/ CREDICORP SAF":103.3,"BBVA RENTA CORTO PLAZO S/. BBVA SAF":70.8,"INTERFONDO-IF OPORTUNIDAD SOLES  SERIE A":129,"SF Corto Plazo Plus S/ SCOTIA FONDOS":106,"FONDOS SURA SAF-SURA CORTO PLAZO SOLES  SERIE B":82.60,"CRED. CONSER. CORTO PLAZO $ CREDICORP SAF":64.9,"BBVA RENTA CORTO PLAZO $ BBVA SAF":70.8,"INTERFONDO-IF OPORTUNIDAD  SERIE A":100.30,"FONDOS SURA SAF-SURA CORTO PLAZO DOLARES  SERIE B":82.60,"SF Corto Plazo Plus $ SCOTIA FONDOS":106.20,"CRED. CONSERVAD. LIQUIDEZ S/ CREDICORP SAF":67.19,"BBVA CASH SOLES BBVA SAF":59.0,"FONDOS SURA SAF-SURA ULTRA CASH SOLES  SERIE B":47.2,"SF Liquidez S/. SCOTIA FONDOS":85.03,"CRED. CONSERVADOR LIQUIDEZ $ CREDICORP SAF":74.27,"BBVA CASH DOLARES BBVA SAF":53.1,"FONDOS SURA SAF-SURA ULTRA CASH DOLARES  SERIE B":47.2,"SF LIQUIDEZ $ SCOTIA FONDOS":90.93,"CC CONSERV. MED. PLAZO S/. CREDICORP SAF":159.3,"BBVA RENTA MED. PLAZO S/. BBVA SAF":88.50,"IF MEDIANO PLAZO SOLES INTERFONDO":159.3,"FONDOS SURA SAF-SURA RENTA SOLES  SERIE B":135.7,"SF MEDIANO PLAZO FLEX S/ SCOTIA FONDOS":118,"CREDICORP CONSER. MED. PLA. $ CREDICORP SAF":159.3,"BBVA RENTA MED. PLAZO $ BBVA SAF":76.7,"FONDOS SURA SAF-FdF SURA RENTA DOLARES  SERIE B":100.3,"IF MEDIANO PLAZO INTERFONDO":159.3,"SF MEDIANO PLAZO FLEX $ SCOTIA FONDOS":118,"CC DEUDA CORPORATIVA SOLES CREDICORP SAF":99.9,"INTERFONDO-IF LIBRE DISPONIBILIDAD S/.  SERIE A":100.3,"INTERFONDO-IF LIBRE DISPONIBILIDAD  SERIE A":73.16,"SURA DEUDA SOBER. DISTRIB. S/ FONDOS SURA SAF":100
};
const COM_CAMBIOS = [
  ["BBVA CASH DOLARES BBVA SAF","2025-02-15",59.0],["BBVA CASH DOLARES BBVA SAF","2025-11-01",63.7],
  ["BBVA CASH SOLES BBVA SAF","2025-02-15",70.8],["BBVA CASH SOLES BBVA SAF","2025-11-01",76.7],
  ["BBVA RENTA CORTO PLAZO $ BBVA SAF","2025-02-15",70.8],["BBVA RENTA CORTO PLAZO $ BBVA SAF","2025-11-01",82.6],
  ["BBVA RENTA CORTO PLAZO S/. BBVA SAF","2025-02-15",82.6],["BBVA RENTA CORTO PLAZO S/. BBVA SAF","2025-11-01",94.4],
  ["BBVA RENTA MED. PLAZO $ BBVA SAF","2025-02-15",88.5],["BBVA RENTA MED. PLAZO $ BBVA SAF","2025-11-01",106.2],
  ["BBVA RENTA MED. PLAZO S/. BBVA SAF","2025-02-15",94.4],["BBVA RENTA MED. PLAZO S/. BBVA SAF","2025-11-01",118.0],
  ["CRED. CONSER. CORTO PLAZO S/ CREDICORP SAF","2025-03-04",116.9],["CRED. CONSER. CORTO PLAZO S/ CREDICORP SAF","2025-07-15",127.5],
  ["CRED. CONSER. CORTO PLAZO $ CREDICORP SAF","2025-03-04",79.1],["CRED. CONSER. CORTO PLAZO $ CREDICORP SAF","2025-07-15",89.7],
  ["CREDICORP CONSER. MED. PLA. $ CREDICORP SAF","2025-03-04",165.2],["CC CONSERV. MED. PLAZO S/. CREDICORP SAF","2025-03-04",165.2],
  ["CRED. CONSERVADOR LIQUIDEZ $ CREDICORP SAF","2025-07-15",71.91],["CRED. CONSERVAD. LIQUIDEZ S/ CREDICORP SAF","2025-07-15",114.39]
];

let historico = {};
let chartBruto = null, chartNeto = null;
let currentIsoFin = null;

function hoyHabil(){const d=new Date();while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function isoRestar(iso,dias){const d=new Date(iso);d.setDate(d.getDate()-dias);return d.toISOString().slice(0,10);}
function fechaMasCercana(iso){const keys=Object.keys(historico).filter(k=>k<=iso).sort();return keys.length?keys[keys.length-1]:null;}

document.getElementById("d1").value = hoyHabil();

function setFin(modo){
  if(modo==='hoy'){const keys=Object.keys(historico).sort();document.getElementById("d1").value=keys.length?keys[keys.length-1]:hoyHabil();}
  else{const d=new Date();while(d.getDay()!==5)d.setDate(d.getDate()-1);document.getElementById("d1").value=d.toISOString().slice(0,10);}
}

function comVigente(fondo,fecha){
  let c=COM_BASE[fondo]||0;
  COM_CAMBIOS.filter(x=>x[0]===fondo&&new Date(x[1])<=fecha).sort((a,b)=>new Date(a[1])-new Date(b[1])).forEach(x=>{c=x[2];});
  return c;
}
function ajuste(fondo,ini,fin){
  const cortes=[new Date(ini)];
  COM_CAMBIOS.filter(x=>x[0]===fondo).forEach(x=>{const d=new Date(x[1]);if(d>ini&&d<fin)cortes.push(d);});
  cortes.push(new Date(fin));cortes.sort((a,b)=>a-b);
  let bps=0;
  for(let i=0;i<cortes.length-1;i++){const dias=(cortes[i+1]-cortes[i])/86400000;bps+=(comVigente(fondo,cortes[i])/360)*dias;}
  return bps;
}

function toSMV(iso){const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}

async function getFecha(iso){
  if(historico[iso]&&Object.keys(historico[iso]).length>0)return historico[iso];
  st(`<span class="spin"></span>Consultando SMV: ${iso}…`);
  const res=await fetch(`${WORKER}/?fecha=${encodeURIComponent(toSMV(iso))}`);
  const data=await res.json();
  if(data.fondos&&Object.keys(data.fondos).length>0)historico[iso]=data.fondos;
  return data.fondos||{};
}

async function cargarHistorico(){
  try{
    const res=await fetch(`${WORKER}/historico`);
    const data=await res.json();
    if(data.fechas){historico={...historico,...data.fechas};const n=Object.keys(data.fechas).length;document.getElementById("kv-info").textContent=`${n} fechas en KV`;}
  }catch(e){}
}

function retorno(fondo,vcFin,isoFin,isoIni){
  const vcIni=historico[isoIni]?.[fondo];
  if(!vcIni||!vcFin)return null;
  const neto=(vcFin/vcIni-1)*10000;
  const bruto=neto+ajuste(fondo,new Date(isoIni),new Date(isoFin));
  return{neto,bruto};
}

async function calcular(){
  const isoFin=document.getElementById("d1").value;
  if(!isoFin){st("⚠ Selecciona una fecha.");return;}
  document.getElementById("btnCalc").disabled=true;
  document.getElementById("chart-section").classList.remove("visible");

  st(`<span class="spin"></span>Cargando histórico…`);
  await cargarHistorico();

  st(`<span class="spin"></span>Cargando ${isoFin}…`);
  let vcFin=await getFecha(isoFin);
  if(!vcFin||Object.keys(vcFin).length===0){
    const ultima=fechaMasCercana(isoFin);
    if(ultima&&ultima!==isoFin){
      st(`⚠ Sin datos para ${isoFin}, usando ${ultima}`);
      document.getElementById("d1").value=ultima;
      vcFin=historico[ultima]||{};
      currentIsoFin=ultima;
    }else{st("⚠ Sin datos disponibles.");document.getElementById("btnCalc").disabled=false;return;}
  } else { currentIsoFin=isoFin; }

  const anoFin=currentIsoFin.slice(0,4);
  const isoYTD=`${parseInt(anoFin)-1}-12-31`;
  await getFecha(isoYTD);

  const fechasDisp=Object.keys(historico).filter(d=>d<=currentIsoFin).sort();
  const isoVentanas={};
  for(const[key,nhabil] of Object.entries({'1':1,'3':3,'7':7,'15':15,'30':30})){
    const idx=fechasDisp.length-1-nhabil;
    isoVentanas[key]=idx>=0?fechasDisp[idx]:null;
  }
  isoVentanas['ytd']=fechaMasCercana(isoYTD);

  const rows=[];
  for(const[cat,fondos] of Object.entries(CATS)){
    for(const f of fondos){
      const vcF=vcFin[f]||null;
      const rets={};
      for(const v of ['1','3','7','15','30','ytd']){
        const isoIni=isoVentanas[v];
        rets[v]=isoIni?retorno(f,vcF,currentIsoFin,isoIni):null;
      }
      rows.push({cat,f,vcF,rets});
    }
  }

  const fmtD=iso=>new Date(iso+'T12:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  st(`Cierre al ${fmtD(currentIsoFin)}`);
  renderTablas(rows);
  poblarSelectFondo();
  document.getElementById("chart-section").classList.add("visible");
  // Default YTD en chart
  document.getElementById("c0").value=isoYTD;
  document.getElementById("c1").value=currentIsoFin;
  document.getElementById("btnCalc").disabled=false;
}

function renderTablas(rows){
  const cols=['1','3','7','15','30','ytd'];
  const colLabels={'1':'1d','3':'3d','7':'7d','15':'15d','30':'30d','ytd':'YTD'};

  function buildTable(tipo){
    const rank={};
    for(const[cat,fondos] of Object.entries(CATS)){
      rank[cat]={};
      for(const v of cols){
        const vals=rows.filter(r=>r.cat===cat&&r.rets[v]!==null)
          .map(r=>({f:r.f,val:r.rets[v]?.[tipo]}))
          .filter(x=>x.val!==null&&!isNaN(x.val))
          .sort((a,b)=>b.val-a.val);
        if(vals.length){rank[cat][v]={top:vals[0].f,bot:vals[vals.length-1].f};}
      }
    }
    let html=`<div class="tcard"><div class="tscroll"><table>
      <thead><tr><th class="l" style="min-width:280px">Fondo</th>${cols.map(v=>`<th>${colLabels[v]}</th>`).join('')}</tr></thead><tbody>`;
    let lastCat=null;
    for(const r of rows){
      if(r.cat!==lastCat){
        html+=`<tr class="cat-row"><td colspan="${cols.length+1}"><span class="cat-label">CATEGORÍA</span>${r.cat}</td></tr>`;
        lastCat=r.cat;
      }
      const icc=/CREDICORP|^CC |^CRED\./i.test(r.f)?'cc':'';
      const sel=false;
      html+=`<tr class="drow" onclick="selectFondoChart('${r.f.replace(/'/g,"\\'")}')">`;
      html+=`<td class="fname"><span class="${icc}">${r.f}</span></td>`;
      for(const v of cols){
        const ret=r.rets[v];const val=ret?.[tipo];
        if(val===null||val===undefined||isNaN(val)){html+=`<td class="na">—</td>`;}
        else{
          const cls=val>=0?'pos':'neg';const sign=val>=0?'+':'';
          const isTop=rank[r.cat][v]?.top===r.f;const isBot=rank[r.cat][v]?.bot===r.f;
          const badge=isTop?`<span class="r1">↑</span>`:isBot?`<span class="rl">↓</span>`:'';
          html+=`<td class="${cls}">${sign}${val.toFixed(1)}${badge}</td>`;
        }
      }
      html+=`</tr>`;
    }
    html+=`</tbody></table></div></div>`;
    return html;
  }

  document.getElementById("content").innerHTML=`
    <div class="perf-block"><div class="block-title">Performance Bruta (bps)</div>${buildTable('bruto')}</div>
    <div class="perf-block"><div class="block-title">Performance Neta (bps)</div>${buildTable('neto')}</div>`;
}

function poblarSelectFondo(){
  const sel=document.getElementById("fondo-select");
  const prev=sel.value;
  sel.innerHTML='<option value="">— Selecciona un fondo —</option>';
  for(const[cat,fondos] of Object.entries(CATS)){
    const og=document.createElement("optgroup");
    og.label=cat;
    for(const f of fondos){const op=document.createElement("option");op.value=f;op.textContent=f;og.appendChild(op);}
    sel.appendChild(og);
  }
  if(prev)sel.value=prev;
}

function selectFondoChart(fondo){
  document.getElementById("fondo-select").value=fondo;
  document.getElementById("chart-section").scrollIntoView({behavior:"smooth",block:"start"});
  dibujarCharts();
}

function chartRango(n,btn){
  const isoFin=currentIsoFin||document.getElementById("d1").value;
  let isoIni;
  if(n==='ytd'){isoIni=`${parseInt(isoFin.slice(0,4))-1}-12-31`;}
  else{
    const fechasDisp=Object.keys(historico).filter(d=>d<=isoFin).sort();
    const idx=fechasDisp.length-1-n;
    isoIni=idx>=0?fechasDisp[idx]:fechasDisp[0];
  }
  document.getElementById("c0").value=isoIni;
  document.getElementById("c1").value=isoFin;
  document.querySelectorAll(".cpill").forEach(b=>b.classList.remove("on"));
  if(btn)btn.classList.add("on");
  dibujarCharts();
}

function chartRangoCustom(){
  const i=document.getElementById("c0").value,f=document.getElementById("c1").value;
  if(!i||!f||i>=f)return;
  document.querySelectorAll(".cpill").forEach(b=>b.classList.remove("on"));
  dibujarCharts();
}

function dibujarCharts(){
  const fondo=document.getElementById("fondo-select").value;
  if(!fondo)return;
  const isoIni=document.getElementById("c0").value;
  const isoFin=document.getElementById("c1").value;
  if(!isoIni||!isoFin)return;

  // Encontrar categoría
  let catFondo=null;
  for(const[cat,fondos] of Object.entries(CATS)){if(fondos.includes(fondo)){catFondo=cat;break;}}
  if(!catFondo)return;
  const peers=CATS[catFondo];

  const fechas=Object.keys(historico).filter(d=>d>=isoIni&&d<=isoFin).sort();
  if(fechas.length<2)return;

  const dark=matchMedia("(prefers-color-scheme:dark)").matches;
  // Colores fijos por SAF
const SAF_COLOR = {
  credicorp: "#e07b20",  // naranja
  bbva:      "#003366",  // azul marino
  sura:      "#2a2a2a",  // negro
  interfondo:"#2a7a2a",  // verde
  scotia:    "#c0392b",  // rojo
};
function safColor(nombre) {
  if(/CREDICORP|^CC |^CRED\./i.test(nombre)) return SAF_COLOR.credicorp;
  if(/BBVA/i.test(nombre)) return SAF_COLOR.bbva;
  if(/SURA/i.test(nombre)) return SAF_COLOR.sura;
  if(/INTERFONDO|^IF /i.test(nombre)) return SAF_COLOR.interfondo;
  if(/SCOTIA|^SF /i.test(nombre)) return SAF_COLOR.scotia;
  return "#888880";
}
  const gridC=dark?"#2e2d28":"#e2dfd6";
  const tickC=dark?"#4a4944":"#b8b5ac";

  function buildDatasets(tipo){
    return peers.map((f,i)=>{
      const isSel=f===fondo;
      const isCC=/CREDICORP|^CC |^CRED\./i.test(f);
      const color=safColor(f);
      const vcBase=historico[fechas[0]]?.[f];
      if(!vcBase)return null;
      const data=[];
      const labels=[];
      let prevVC=vcBase;
      for(const d of fechas){
        const vc=historico[d]?.[f];
        if(!vc)continue;
        const neto=(vc/vcBase-1)*10000;
        const bruto=neto+ajuste(f,new Date(fechas[0]),new Date(d));
        data.push(tipo==='bruto'?+bruto.toFixed(2):+neto.toFixed(2));
        labels.push(d.slice(5));
        prevVC=vc;
      }
      return{label:f,data,labels,borderColor:color,backgroundColor:"transparent",
        borderWidth:isSel?2.5:1.2,borderDash:isSel?[]:[4,3],pointRadius:0,tension:0.3,order:isSel?0:1,
        opacity:isSel?1:0.65};
    }).filter(Boolean);
  }

  function renderChart(canvasId,legendId,tipo){
    const datasets=buildDatasets(tipo);
    const mainLabels=datasets.find(d=>d.label===fondo)?.labels||datasets[0]?.labels||[];
    const canvas=document.getElementById(canvasId);
    const existing=Chart.getChart(canvas);
    if(existing)existing.destroy();
    new Chart(canvas,{
      type:"line",
      data:{labels:mainLabels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>{const v=+c.raw;return` ${shortName(c.dataset.label)}: ${v>=0?"+":""}${v.toFixed(1)} bps`;}}}
        },
        scales:{
          x:{ticks:{color:tickC,font:{family:"'IBM Plex Mono'",size:10},maxTicksLimit:8,autoSkip:true},grid:{color:gridC}},
          y:{ticks:{color:tickC,font:{family:"'IBM Plex Mono'",size:10},callback:v=>(v>=0?"+":"")+v.toFixed(0)+" bps"},grid:{color:gridC}}
        }
      }
    });
    // Legend
    document.getElementById(legendId).innerHTML=datasets.map(d=>{
      const isSel=d.label===fondo;
      return`<div class="leg${isSel?" hi":""}"><div class="leg-line" style="background:${safColor(d.label)};opacity:${isSel?1:0.65}"></div>${shortName(d.label)}</div>`;
    }).join("");
  }

  renderChart("chart-bruto","legend-bruto","bruto");
  renderChart("chart-neto","legend-neto","neto");
}

function shortName(f){
  if(/CREDICORP SAF|CREDICORP SAF/.test(f))return f.replace(/ CREDICORP SAF$/,"").replace(/FONDOS SURA SAF-/,"").trim();
  return f.replace(/ BBVA SAF$/,"").replace(/ FONDOS SURA SAF$/,"").replace(/FONDOS SURA SAF-/,"").replace(/ INTERFONDO$/,"").replace(/ SCOTIA FONDOS$/,"").replace(/ SERIE B$/,"").trim();
}

function st(msg){document.getElementById("status").innerHTML=msg;}
cargarHistorico();
</script>
